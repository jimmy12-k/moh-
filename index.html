    <style>
        /* ===== CSS RESET & BASE ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0c; color: #fff; overflow-x: hidden; line-height: 1.6;
        }
        ::selection { background: rgba(212, 168, 67, 0.3); color: inherit; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1f; }
        ::-webkit-scrollbar-thumb { background: #d4a843; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #f2e0b0; }
        
        /* ===== VARIABLES ===== */
        :root {
            --gold: #d4a843;
            --gold-light: #f2e0b0;
            --gold-dark: #a37d2f;
            --dark: #0a0a0c;
            --dark-50: #f6f6f7;
            --dark-100: #e1e1e4;
            --dark-200: #c2c2c8;
            --dark-300: #9e9ea8;
            --dark-400: #7a7a87;
            --dark-500: #5e5e6b;
            --dark-600: #4a4a55;
            --dark-700: #3d3d47;
            --dark-800: #34343b;
            --dark-900: #2e2e33;
            --dark-950: #0a0a0c;
        }
        
        /* ===== UTILITIES ===== */
        .container { width: 100%; max-width: 1920px; margin: 0 auto; padding: 0 1rem; }
        @media (min-width: 640px) { .container { padding: 0 1.5rem; } }
        @media (min-width: 1024px) { .container { padding: 0 2rem; } }
        @media (min-width: 1536px) { .container { padding: 0 4rem; } }
        
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
        }
        
        .glass-hover { transition: all 0.3s ease; }
        .glass-hover:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(212, 168, 67, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .text-gold-gradient {
            background: linear-gradient(135deg, #d4a843 0%, #f2e0b0 50%, #d4a843 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-primary {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--gold); color: #0a0a0c;
            font-weight: 600; border-radius: 0.75rem;
            border: none; cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(212, 168, 67, 0.39);
        }
        .btn-primary:hover { background: #f2e0b0; transform: translateY(-2px); }
        .btn-primary:active { transform: scale(0.95); }
        
        .btn-secondary {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: transparent; color: var(--gold);
            font-weight: 600; border-radius: 0.75rem;
            border: 2px solid var(--gold); cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover { background: var(--gold); color: #0a0a0c; }
        
        .line-clamp-2 {
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.5rem;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 0 0 rgba(212, 168, 67, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(212, 168, 67, 0); }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-pulse-gold { animation: pulse-gold 2s infinite; }
        
        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            transition: all 0.5s ease;
            padding: 1rem 0;
        }
        .navbar.scrolled {
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .navbar-inner { display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
        .logo-icon {
            position: relative; width: 40px; height: 40px;
        }
        .logo-icon::before {
            content: ''; position: absolute; inset: 0;
            background: var(--gold); border-radius: 0.5rem;
            transform: rotate(3deg); transition: transform 0.3s ease;
        }
        .logo:hover .logo-icon::before { transform: rotate(6deg); }
        .logo-icon-inner {
            position: absolute; inset: 0;
            background: #0a0a0c; border-radius: 0.5rem;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(212, 168, 67, 0.3);
        }
        .logo-text h1 { font-size: 1.25rem; font-weight: 700; color: #fff; line-height: 1; }
        .logo-text span { font-size: 0.65rem; color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase; }
        
        .nav-links { display: none; align-items: center; gap: 0.25rem; }
        @media (min-width: 1024px) { .nav-links { display: flex; } }
        .nav-link {
            position: relative; padding: 0.5rem 1rem;
            color: var(--dark-300); text-decoration: none;
            font-size: 0.875rem; font-weight: 500;
            border-radius: 0.5rem; transition: all 0.3s ease;
        }
        .nav-link:hover, .nav-link.active { color: var(--gold); }
        .nav-link.active::before {
            content: ''; position: absolute; inset: 0;
            background: rgba(212, 168, 67, 0.1);
            border-radius: 0.5rem; border: 1px solid rgba(212, 168, 67, 0.2);
        }
        
        .nav-actions { display: flex; align-items: center; gap: 0.5rem; }
        .nav-btn {
            padding: 0.5rem; border-radius: 0.5rem;
            background: transparent; border: none;
            color: var(--dark-300); cursor: pointer;
            transition: all 0.3s ease;
        }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        
        .mobile-menu-btn { display: block; }
        @media (min-width: 1024px) { .mobile-menu-btn { display: none; } }
        
        /* ===== MOBILE MENU ===== */
        .mobile-menu {
            position: fixed; inset: 0; z-index: 999;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .mobile-menu.open { opacity: 1; pointer-events: auto; }
        .mobile-menu-panel {
            position: absolute; right: 0; top: 0; bottom: 0;
            width: 320px; background: #0a0a0c;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            padding: 5rem 1.5rem 1.5rem;
        }
        .mobile-menu.open .mobile-menu-panel { transform: translateX(0); }
        .mobile-nav-link {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem 1rem; border-radius: 0.75rem;
            color: var(--dark-300); text-decoration: none;
            font-weight: 500; margin-bottom: 0.5rem;
            transition: all 0.3s ease;
        }
        .mobile-nav-link:hover, .mobile-nav-link.active {
            background: rgba(212, 168, 67, 0.1);
            color: var(--gold); border: 1px solid rgba(212, 168, 67, 0.2);
        }
        
        /* ===== HERO SECTION ===== */
        .hero {
            position: relative; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .hero-video-bg {
            position: absolute; inset: 0; z-index: 0;
        }
        .hero-video-bg video, .hero-video-bg img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .hero-overlay {
            position: absolute; inset: 0; z-index: 1;
            background: linear-gradient(to bottom, rgba(10,10,12,0.8) 0%, rgba(10,10,12,0.4) 50%, rgba(10,10,12,0.95) 100%);
        }
        .hero-content {
            position: relative; z-index: 2; text-align: center;
            padding: 0 1rem;
        }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(212, 168, 67, 0.1);
            border: 1px solid rgba(212, 168, 67, 0.2);
            border-radius: 9999px; margin-bottom: 2rem;
            color: var(--gold); font-size: 0.875rem; font-weight: 500;
        }
        .hero-title {
            font-size: 3rem; font-weight: 700; line-height: 1.1;
            margin-bottom: 1.5rem;
        }
        @media (min-width: 640px) { .hero-title { font-size: 4rem; } }
        @media (min-width: 768px) { .hero-title { font-size: 5rem; } }
        @media (min-width: 1024px) { .hero-title { font-size: 6rem; } }
        .hero-subtitle {
            font-size: 1.125rem; color: var(--dark-200);
            max-width: 600px; margin: 0 auto 2.5rem;
        }
        .hero-buttons { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; margin-bottom: 4rem; }
        
        .hero-stats {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 2rem; max-width: 500px; margin: 0 auto;
        }
        .hero-stat-icon {
            width: 48px; height: 48px; border-radius: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 0.5rem;
        }
        .hero-stat-value { font-size: 1.5rem; font-weight: 700; color: #fff; }
        .hero-stat-label { font-size: 0.75rem; color: var(--dark-400); }
        
        .scroll-indicator {
            position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
            z-index: 2; text-align: center;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }
        
        /* ===== SECTIONS ===== */
        .section { padding: 4rem 0; }
        @media (min-width: 768px) { .section { padding: 6rem 0; } }
        
        .section-header { text-align: center; margin-bottom: 3rem; }
        .section-title { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; }
        @media (min-width: 768px) { .section-title { font-size: 2.5rem; } }
        .section-subtitle { color: var(--dark-300); max-width: 600px; margin: 0 auto; }
        
        /* ===== CATEGORIES ===== */
        .categories-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;
        }
        @media (min-width: 768px) { .categories-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .categories-grid { grid-template-columns: repeat(5, 1fr); } }
        
        .category-card {
            display: block; padding: 1.5rem;
            text-decoration: none; color: inherit;
        }
        .category-icon {
            width: 48px; height: 48px; border-radius: 0.75rem;
            background: rgba(212, 168, 67, 0.1);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1rem; font-size: 1.5rem;
        }
        .category-card:hover .category-icon { background: rgba(212, 168, 67, 0.2); }
        .category-name { font-weight: 600; color: #fff; margin-bottom: 0.25rem; }
        .category-card:hover .category-name { color: var(--gold); }
        .category-desc { font-size: 0.875rem; color: var(--dark-400); margin-bottom: 0.75rem; }
        .category-link { font-size: 0.875rem; color: var(--gold); display: flex; align-items: center; gap: 0.25rem; }
        
        /* ===== VIDEO GRID ===== */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr); gap: 1.5rem;
        }
        @media (min-width: 640px) { .video-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .video-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1280px) { .video-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .video-card {
            display: block; text-decoration: none; color: inherit;
            border-radius: 1rem; overflow: hidden;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
        }
        .video-card:hover { transform: scale(1.02); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }
        .video-thumbnail {
            position: relative; aspect-ratio: 16/9;
            background: var(--dark-800); overflow: hidden;
        }
        .video-thumbnail img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.7s ease;
        }
        .video-card:hover .video-thumbnail img { transform: scale(1.1); }
        .video-thumbnail-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(10,10,12,0.9) 0%, transparent 50%);
        }
        .video-play-btn {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .video-card:hover .video-play-btn { opacity: 1; }
        .video-play-icon {
            width: 64px; height: 64px; border-radius: 50%;
            background: rgba(212, 168, 67, 0.9);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(212, 168, 67, 0.3);
        }
        .video-duration {
            position: absolute; bottom: 0.75rem; right: 0.75rem;
            padding: 0.25rem 0.5rem; background: rgba(0, 0, 0, 0.7);
            border-radius: 0.375rem; font-size: 0.75rem; color: #fff;
        }
        .video-category-badge {
            position: absolute; top: 0.75rem; left: 0.75rem;
            padding: 0.25rem 0.75rem;
            background: rgba(212, 168, 67, 0.2);
            border: 1px solid rgba(212, 168, 67, 0.3);
            border-radius: 9999px; font-size: 0.75rem;
            color: var(--gold); font-weight: 500;
            backdrop-filter: blur(4px);
        }
        .video-info { padding: 1rem; }
        .video-title {
            font-weight: 600; color: #fff; margin-bottom: 0.5rem;
            transition: color 0.3s ease;
        }
        .video-card:hover .video-title { color: var(--gold); }
        .video-meta {
            display: flex; align-items: center; gap: 0.5rem;
            color: var(--dark-400); font-size: 0.75rem;
        }
        .video-meta span { display: flex; align-items: center; gap: 0.25rem; }
        
        /* ===== SHORTS ===== */
        .shorts-container {
            display: flex; gap: 1rem;
            overflow-x: auto; scrollbar-width: none;
            padding-bottom: 1rem;
        }
        .shorts-container::-webkit-scrollbar { display: none; }
        
        .short-card {
            flex-shrink: 0; width: 200px; cursor: pointer;
        }
        @media (min-width: 768px) { .short-card { width: 240px; } }
        .short-thumbnail {
            position: relative; aspect-ratio: 9/16;
            border-radius: 1rem; overflow: hidden;
            background: var(--dark-800);
        }
        .short-thumbnail img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s ease;
        }
        .short-card:hover .short-thumbnail img { transform: scale(1.1); }
        .short-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(10,10,12,0.8) 0%, transparent 50%);
        }
        .short-play {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .short-card:hover .short-play { opacity: 1; }
        .short-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 0.75rem; }
        .short-title { font-size: 0.875rem; font-weight: 600; color: #fff; margin-bottom: 0.25rem; }
        .short-stats { display: flex; gap: 0.75rem; color: rgba(255,255,255,0.7); font-size: 0.75rem; }
        .short-duration {
            position: absolute; top: 0.5rem; right: 0.5rem;
            padding: 0.125rem 0.5rem; background: rgba(0,0,0,0.6);
            border-radius: 0.25rem; font-size: 0.75rem; color: #fff;
        }
        
        /* ===== SHORTS PLAYER ===== */
        .shorts-player {
            position: fixed; inset: 0; z-index: 2000;
            background: #000; display: none;
        }
        .shorts-player.active { display: flex; }
        .shorts-player-close {
            position: absolute; top: 1rem; left: 1rem; z-index: 10;
            padding: 0.5rem; border-radius: 50%;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(4px);
            border: none; color: #fff; cursor: pointer; font-size: 1.5rem;
        }
        .shorts-player-content {
            width: 100%; max-width: 500px; margin: 0 auto;
            position: relative; height: 100%;
        }
        .shorts-player-video {
            width: 100%; height: 100%; object-fit: cover;
        }
        .shorts-player-info {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 2rem 1.5rem 6rem;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent);
        }
        .shorts-player-actions {
            position: absolute; right: 1rem; bottom: 6rem;
            display: flex; flex-direction: column; gap: 1rem;
        }
        .shorts-action-btn {
            display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
            background: none; border: none; color: #fff; cursor: pointer;
        }
        .shorts-action-btn .icon {
            width: 48px; height: 48px; border-radius: 50%;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem; transition: all 0.3s ease;
        }
        .shorts-action-btn:hover .icon { background: rgba(255,255,255,0.2); }
        .shorts-action-btn.liked .icon { background: #ef4444; }
        .shorts-action-btn.saved .icon { background: var(--gold); color: #0a0a0c; }
        .shorts-action-btn span { font-size: 0.75rem; }
        
        /* ===== VIDEO PLAYER MODAL ===== */
        .video-modal {
            position: fixed; inset: 0; z-index: 2000;
            background: rgba(0, 0, 0, 0.95);
            display: none; align-items: center; justify-content: center;
            padding: 1rem;
        }
        .video-modal.active { display: flex; }
        .video-modal-close {
            position: absolute; top: 1rem; right: 1rem;
            padding: 0.5rem; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: none;
            color: #fff; cursor: pointer; font-size: 1.5rem; z-index: 10;
        }
        .video-modal-content {
            width: 100%; max-width: 1200px;
            display: grid; grid-template-columns: 1fr;
            gap: 1.5rem; max-height: 90vh; overflow-y: auto;
        }
        @media (min-width: 1024px) { .video-modal-content { grid-template-columns: 2fr 1fr; } }
        
        .main-player {
            position: relative; aspect-ratio: 16/9;
            background: #000; border-radius: 1rem; overflow: hidden;
        }
        .main-player video { width: 100%; height: 100%; }
        .player-controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 1rem;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent);
        }
        .progress-bar {
            width: 100%; height: 4px; background: rgba(255,255,255,0.2);
            border-radius: 2px; cursor: pointer; margin-bottom: 0.75rem;
        }
        .progress-fill { height: 100%; background: var(--gold); border-radius: 2px; width: 0%; }
        .player-buttons { display: flex; align-items: center; gap: 1rem; }
        .player-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 1.25rem; }
        
        /* ===== TESTIMONIALS ===== */
        .testimonials-grid {
            display: grid; grid-template-columns: 1fr; gap: 1.5rem;
        }
        @media (min-width: 768px) { .testimonials-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .testimonials-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .testimonial-card { padding: 1.5rem; }
